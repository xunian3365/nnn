name: Build Zygisk SO ARM64
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 下载NDK（国内镜像）
        run: |
          wget https://mirrors.ustc.edu.cn/android/android-ndk-r26c-linux.zip
          unzip android-ndk-r26c-linux.zip
          echo "NDK_HOME=$PWD/android-ndk-r26c" >> $GITHUB_ENV
      - name: 编译SO库
        run: |
          mkdir build && cd build
          cp ../*.cpp ../Android.mk ./
          echo "APP_ABI=arm64-v8a" > Application.mk
          echo "APP_PLATFORM=android-32" >> Application.mk
          echo "APP_STL=c++_static" >> Application.mk
          ${{ env.NDK_HOME }}/build/ndk-build NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=./Android.mk
      - name: 上传编译成品
        uses: actions/upload-artifact@v4
        with:
          path: build/libs/arm64-v8a/libzygisk.so
