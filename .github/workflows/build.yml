name: Build Arm64 Zygisk SO
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置和配置 Android NDK 环境
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26c # 自动拉取官方r26c并配置好全局环境变量
          link-to-sdk: true

      - name: 编译SO
        run: |
          mkdir build && cd build
          cp ../*.cpp ../*.hpp ../Android.mk ./
          
          # 生成 NDK 编译所需的全局配置文件
          echo "APP_ABI=arm64-v8a" > Application.mk
          echo "APP_PLATFORM=android-31" >> Application.mk
          echo "APP_STL=c++_static" >> Application.mk
          
          # 使用组件自动注入的本地环境变量直接进行编译
          ${{ steps.setup-ndk.outputs.ndk-path }}/ndk-build NDK_PROJECT_PATH=.

      - name: 导出成品库
        uses: actions/upload-artifact@v4
        with:
          name: arm64-lib-output
          path: build/libs/arm64-v8a/libzygisk.so
