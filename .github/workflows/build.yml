name: Build Zygisk Spoof SO
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Android NDK r26c 谷歌官方加速
        run: |
          # 换成谷歌 Android 官方全球 CDN 镜像源，专治海外服务器下载失败
          wget -q --timeout=60 --tries=5 https://dl.google.com/android/repository/android-ndk-r26c-linux.zip
          unzip -q android-ndk-r26c-linux.zip
          echo "NDK_ROOT=$PWD/android-ndk-r26c" >> $GITHUB_ENV

      - name: 编译arm64-v8a动态库
        run: |
          ${{ env.NDK_ROOT }}/ndk-build \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=jni/Android.mk \
            APP_PLATFORM=android-31 \
            APP_ABI=arm64-v8a

      - name: 导出编译产物
        uses: actions/upload-artifact@v4
        with:
          name: zygisk-spoof-lib-arm64
          path: libs/arm64-v8a/libzygisk.so
